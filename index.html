<!DOCTYPE html>
<html lang="sr" dir="ltr">
  <head>
    <title>Lorena</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <meta name="description" content="Idemo na piće?"/>
    <meta name="keywords" content="Lorena,idemo na piće,poziv na piće"/>
    <meta property="og:title" content="Lorena"/>
    <meta property="og:description" content="Idemo na piće?"/>
    <meta property="og:type" content="website"/>
    <meta property="og:url" content="https://poslovninalog1.github.io/lorena/"/>
    <meta name="theme-color" content="#0a0a0a">
    <link rel="stylesheet" href="./style.css">
    <link rel="apple-touch-icon" sizes="57x57" href="image/icons/favicon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="image/icons/favicon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="image/icons/favicon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="image/icons/favicon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="image/icons/favicon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="image/icons/favicon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="image/icons/favicon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="image/icons/favicon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="image/icons/favicon-180x180.png">
    <link rel="icon" type="image/png" sizes="16x16" href="image/icons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="image/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="image/icons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="192x192" href="image/icons/favicon-192x192.png">
    <link rel="shortcut icon" type="image/x-icon" href="image/icons/favicon.ico">
    <link rel="icon" type="image/x-icon" href="image/icons/favicon.ico">
    <meta name="msapplication-TileColor" content="#0a0a0a">
    <meta name="msapplication-TileImage" content="image/icons/favicon-144x144.png">
    <meta name="msapplication-config" content="image/icons/browserconfig.xml">
    <link rel="manifest" href="image/icons/manifest.json">
  </head>
  <body>
        <div id="ask" class="container">
            <div>
                <h1 class="header_text">Idemo na piće?</h1>
            </div>
            <div class="gif_container">
                <img src="image/ask.gif" alt="Slatka animirana ilustracija">
            </div>
            <div class="buttons">
                <button class="btn" id="yesButton" type="button">DA</button>
                <button class="btn" id="noButton" type="button">NE</button>
            </div>
            <audio id="noAudio" preload="auto" src="image/obsession-no.mp3"></audio>
            <audio id="yesAudio" preload="auto" src="image/yes-cheer.mp3"></audio>
        </div>

        <div id="ans" class="container">
            <h1 class="header_text success_text">Vidimo se večeras u 20:30!</h1>
            <div class="gif_container">
                <img src="image/ans.gif" alt="Slatka animirana ilustracija">
            </div>
        </div>
    </body>
    <script>
        var NOTIFY_EMAIL = 'poslovninalog1405@gmail.com';
        var lastNeMail = 0;
        var isTouch = window.matchMedia('(pointer: coarse)').matches;

        function playNoAudio() {
            var audio = document.getElementById('noAudio');
            audio.currentTime = 0;
            audio.play();
        }

        function playYesAudio() {
            var audio = document.getElementById('yesAudio');
            audio.currentTime = 0;
            audio.play();
        }

        function sendMail(type) {
            var subject = type === 'da'
                ? 'Lorena je kliknula DA!'
                : 'Lorena pokušava NE';

            var message = type === 'da'
                ? 'Kliknula je DA. Večeras u 20:30.'
                : 'Pokušala je uhvatiti dugme NE — pobjeglo je.';

            fetch('https://formsubmit.co/ajax/' + NOTIFY_EMAIL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    _subject: subject,
                    poruka: message,
                    tip: type === 'da' ? 'DA' : 'NE',
                    vrijeme: new Date().toLocaleString('sr-RS'),
                    _captcha: 'false'
                })
            }).catch(function() {});
        }

        function notifyNeAttempt() {
            var now = Date.now();
            if (now - lastNeMail < 45000) return;
            lastNeMail = now;
            sendMail('ne');
        }

        function nextPage() {
            var yesBtn = document.getElementById('yesButton');
            if (yesBtn.disabled) return;

            yesBtn.disabled = true;
            playYesAudio();
            sendMail('da');

            document.getElementById('ask').style.display = 'none';
            document.getElementById('ans').style.display = 'block';
        }

        function placeNoButton() {
            var yesBtn = document.getElementById('yesButton');
            var noBtn = document.getElementById('noButton');
            var yesRect = yesBtn.getBoundingClientRect();

            noBtn.classList.add('fleeing');
            noBtn.style.left = (yesRect.right + 16) + 'px';
            noBtn.style.top = yesRect.top + 'px';
        }

        function moveButton(e) {
            if (e && e.cancelable) e.preventDefault();
            if (e) e.stopPropagation();

            var btn = document.getElementById('noButton');
            btn.classList.add('fleeing');

            var w = btn.offsetWidth;
            var h = btn.offsetHeight;
            var pad = 12;
            var maxX = window.innerWidth - w - pad;
            var maxY = window.innerHeight - h - pad;
            var x = pad + Math.random() * Math.max(maxX - pad, 0);
            var y = pad + Math.random() * Math.max(maxY - pad, 0);

            btn.style.left = x + 'px';
            btn.style.top = y + 'px';

            playNoAudio();
            notifyNeAttempt();
        }

        function isNearNoButton(x, y) {
            var rect = document.getElementById('noButton').getBoundingClientRect();
            var pad = 50;
            return x >= rect.left - pad && x <= rect.right + pad &&
                   y >= rect.top - pad && y <= rect.bottom + pad;
        }

        document.getElementById('yesButton').addEventListener('click', nextPage);

        var noBtn = document.getElementById('noButton');
        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('pointerdown', moveButton);
        noBtn.addEventListener('touchstart', moveButton, { passive: false });

        if (isTouch) {
            window.addEventListener('load', placeNoButton);
            window.addEventListener('resize', placeNoButton);

            document.addEventListener('touchstart', function(e) {
                if (e.target.id === 'yesButton') return;
                var touch = e.touches[0];
                if (isNearNoButton(touch.clientX, touch.clientY)) {
                    moveButton(e);
                }
            }, { passive: false });
        }
    </script>
</html>
