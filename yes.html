    <meta name="theme-color" content="#0a0a0a">

    <link rel="icon" type="image/x-icon" href="image/icons/favicon.ico">

    <script>
        if (sessionStorage.getItem('lorena_yes') !== '1') {
            window.location.replace('index.html');

            audio.play().catch(function() {});
        }
